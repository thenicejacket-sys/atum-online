<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATUM — AI Consulting Platform</title>
    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- ══════════════════════════════════════════════════════════════
         INLINE — jamais mis en cache, toujours exécuté en premier
         ══════════════════════════════════════════════════════════════ -->
    <style>
      /* Masquer tous les anciens boutons injectés par les scripts cachés */
      #pai-theme-toggle,
      #pai-wallpaper-btn,
      #atum-settings-btn,
      #pai-settings-panel-btn { display: none !important; }

      /* Activer le bouton Paramètres natif React (override inline style React) */
      button[title="Parametres"] {
        opacity: 1 !important;
        cursor: pointer !important;
        pointer-events: auto !important;
      }
    </style>

    <script>
    (function () {
      // ── Thème appliqué immédiatement ──────────────────────────────────────
      var saved = localStorage.getItem('pai_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', saved);

      // ── PARTIE A — Éliminer les boutons parasites de façon permanente ──────
      var _badIds = ['pai-theme-toggle','pai-wallpaper-btn','atum-settings-btn','pai-settings-panel-btn'];
      function _cleanBadBtns() {
        _badIds.forEach(function(id) { var el = document.getElementById(id); if (el) el.remove(); });
      }
      _cleanBadBtns();
      var _domObs = new MutationObserver(function() { _cleanBadBtns(); });
      _domObs.observe(document.documentElement, { childList: true, subtree: true });

      // ── PARTIE B — Activer le bouton Paramètres en permanence ──────────────
      function _patchParamBtn(btn) {
        btn.removeAttribute('disabled');
        btn.style.opacity = '1';
        btn.style.cursor = 'pointer';
        btn.style.pointerEvents = 'auto';
        // Observer UNIQUEMENT les changements d'attribut sur CE bouton
        var obs = new MutationObserver(function() {
          if (btn.hasAttribute('disabled') || btn.style.opacity === '0.35') {
            btn.removeAttribute('disabled');
            btn.style.opacity = '1';
            btn.style.cursor = 'pointer';
            btn.style.pointerEvents = 'auto';
          }
        });
        obs.observe(btn, { attributes: true, attributeFilter: ['disabled', 'style', 'class'] });
        // Listener click direct sur le bouton (en plus du capture sur document)
        btn.addEventListener('click', function(e) {
          e.stopImmediatePropagation();
          if (window._paiShowSettingsPanel) window._paiShowSettingsPanel();
        }, true);
      }
      // Appliquer dès que le bouton existe dans le DOM
      var _btnWatchObs = new MutationObserver(function() {
        var btn = document.querySelector('button[title="Parametres"]');
        if (btn && !btn._paiPatched) {
          btn._paiPatched = true;
          _patchParamBtn(btn);
          _btnWatchObs.disconnect();
        }
      });
      _btnWatchObs.observe(document.documentElement, { childList: true, subtree: true });
      // Si déjà présent
      var _existingBtn = document.querySelector('button[title="Parametres"]');
      if (_existingBtn && !_existingBtn._paiPatched) {
        _existingBtn._paiPatched = true;
        _patchParamBtn(_existingBtn);
      }

      // ── Panel Paramètres ──────────────────────────────────────────────────
      window._paiShowSettingsPanel = function () {
        var existing = document.getElementById('pai-settings-panel');
        if (existing) { existing.remove(); return; }

        var isDark = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
        var bg   = isDark ? '#1E1E2E' : '#FFFFFF';
        var fg   = isDark ? '#EDEDED' : '#171717';
        var muted = '#888888';

        var panel = document.createElement('div');
        panel.id = 'pai-settings-panel';
        panel.style.cssText = [
          'position:fixed','bottom:20px','left:70px','z-index:999999',
          'background:' + bg,
          'border:1px solid rgba(255,255,255,0.12)',
          'border-radius:14px','padding:20px','width:300px',
          'box-shadow:0 8px 32px rgba(0,0,0,0.65)',
          'font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif',
          'color:' + fg,
        ].join(';');

        // ── Section THÈME ───────────────────────────────────────────────────
        var title1 = document.createElement('p');
        title1.textContent = 'THÈME';
        title1.style.cssText = 'margin:0 0 10px;font-size:11px;font-weight:600;letter-spacing:.8px;color:' + muted;
        panel.appendChild(title1);

        var themeRow = document.createElement('div');
        themeRow.style.cssText = 'display:flex;gap:8px;margin-bottom:20px';
        var curTheme = document.documentElement.getAttribute('data-theme') || 'dark';

        ['dark', 'light'].forEach(function (th) {
          var b = document.createElement('button');
          b.textContent = th === 'dark' ? '🌙  Sombre' : '☀️  Clair';
          b.setAttribute('data-t', th);
          var active = th === curTheme;
          b.style.cssText = 'flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;'
            + 'background:' + (active ? '#14b8a6' : (isDark ? '#2A2A3C' : '#E8E8E8')) + ';'
            + 'color:' + (active ? '#fff' : (isDark ? '#A8A8A8' : '#555'));
          b.onclick = function () {
            document.documentElement.setAttribute('data-theme', th);
            localStorage.setItem('pai_theme', th);
            var d = th === 'dark';
            panel.querySelectorAll('[data-t]').forEach(function (x) {
              var a = x.getAttribute('data-t') === th;
              x.style.background = a ? '#14b8a6' : (d ? '#2A2A3C' : '#E8E8E8');
              x.style.color = a ? '#fff' : (d ? '#A8A8A8' : '#555');
            });
          };
          themeRow.appendChild(b);
        });
        panel.appendChild(themeRow);

        // ── Section FOND D'ÉCRAN ────────────────────────────────────────────
        if (window._paiWallpapers && window._paiWallpapers.length > 0) {
          var title2 = document.createElement('p');
          title2.textContent = "FOND D'ÉCRAN";
          title2.style.cssText = 'margin:0 0 10px;font-size:11px;font-weight:600;letter-spacing:.8px;color:' + muted;
          panel.appendChild(title2);

          var grid = document.createElement('div');
          grid.style.cssText = 'display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px';
          var curWall = localStorage.getItem('pai_wallpaper') || 'ai';

          window._paiWallpapers.forEach(function (w) {
            var card = document.createElement('div');
            card.setAttribute('data-wk', w.key);
            card.style.cssText = 'border-radius:8px;overflow:hidden;cursor:pointer;outline:'
              + (w.key === curWall ? '2px solid #14b8a6' : '2px solid transparent');
            var img = document.createElement('img');
            img.src = w.dark;
            img.style.cssText = 'width:100%;height:56px;object-fit:cover;display:block;pointer-events:none';
            var lbl = document.createElement('div');
            lbl.textContent = w.label;
            lbl.style.cssText = 'padding:4px 6px;font-size:11px;font-weight:500;text-align:center;'
              + 'background:' + (isDark ? '#161616' : '#E0E0E0') + ';color:' + (isDark ? '#A8A8A8' : '#555');
            card.appendChild(img);
            card.appendChild(lbl);
            card.onclick = function () {
              if (window._paiApplyWallpaper) window._paiApplyWallpaper(w.key);
              panel.querySelectorAll('[data-wk]').forEach(function (c) {
                c.style.outline = c.getAttribute('data-wk') === w.key
                  ? '2px solid #14b8a6' : '2px solid transparent';
              });
            };
            grid.appendChild(card);
          });
          panel.appendChild(grid);
        }

        // ── Section CLÉ API (web uniquement) ───────────────────────────────
        if (window._atumShowApiKeyModal) {
          var sep = document.createElement('div');
          sep.style.cssText = 'border-top:1px solid rgba(255,255,255,0.07);margin:4px 0 14px';
          panel.appendChild(sep);
          var apiBtn = document.createElement('button');
          apiBtn.textContent = '🔑  Clé API / Modèle';
          apiBtn.style.cssText = 'width:100%;padding:10px 12px;border-radius:8px;text-align:left;'
            + 'border:1px solid rgba(255,255,255,0.1);background:transparent;'
            + 'color:' + (isDark ? '#A8A8A8' : '#555') + ';cursor:pointer;font-size:13px';
          apiBtn.onclick = function () { panel.remove(); window._atumShowApiKeyModal(); };
          panel.appendChild(apiBtn);
        }

        // ── Section LANGUE ──────────────────────────────────────────────────
        var sepLang = document.createElement('div');
        sepLang.style.cssText = 'border-top:1px solid rgba(255,255,255,0.07);margin:4px 0 14px';
        panel.appendChild(sepLang);

        var langTitle = document.createElement('p');
        langTitle.textContent = (window._paiGetLang && window._paiGetLang() === 'en') ? 'LANGUAGE' : 'LANGUE';
        langTitle.style.cssText = 'margin:0 0 10px;font-size:11px;font-weight:600;letter-spacing:.8px;color:' + muted;
        panel.appendChild(langTitle);

        var langRow = document.createElement('div');
        langRow.style.cssText = 'display:flex;gap:8px;margin-bottom:20px';
        var curLang = (window._paiGetLang && window._paiGetLang()) || localStorage.getItem('pai_lang') || 'fr';

        [['fr', '🇫🇷  Français'], ['en', '🇬🇧  English']].forEach(function(pair) {
          var code = pair[0], label = pair[1];
          var b = document.createElement('button');
          b.textContent = label;
          b.setAttribute('data-lang-btn', code);
          var active = code === curLang;
          b.style.cssText = 'flex:1;padding:10px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:500;'
            + 'background:' + (active ? '#14b8a6' : (isDark ? '#2A2A3C' : '#E8E8E8')) + ';'
            + 'color:' + (active ? '#fff' : (isDark ? '#A8A8A8' : '#555'));
          b.onclick = function() {
            if (window._paiSetLang) window._paiSetLang(code);
            panel.querySelectorAll('[data-lang-btn]').forEach(function(x) {
              var a = x.getAttribute('data-lang-btn') === code;
              x.style.background = a ? '#14b8a6' : (isDark ? '#2A2A3C' : '#E8E8E8');
              x.style.color = a ? '#fff' : (isDark ? '#A8A8A8' : '#555');
            });
          };
          langRow.appendChild(b);
        });
        panel.appendChild(langRow);

        // ── Section MAIL ACTIF ──────────────────────────────────────────────
        var sep2 = document.createElement('div');
        sep2.style.cssText = 'border-top:1px solid rgba(255,255,255,0.07);margin:4px 0 14px';
        panel.appendChild(sep2);

        var title3 = document.createElement('p');
        title3.textContent = 'MAIL ACTIF';
        title3.style.cssText = 'margin:0 0 10px;font-size:11px;font-weight:600;letter-spacing:.8px;color:' + muted;
        panel.appendChild(title3);

        var mailRow = document.createElement('div');
        mailRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:4px';

        var mailLabel = document.createElement('span');
        mailLabel.textContent = 'Réponses email automatiques';
        mailLabel.style.cssText = 'font-size:13px;color:' + (isDark ? '#A8A8A8' : '#555');

        var mailToggle = document.createElement('button');
        mailToggle.style.cssText = 'width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background .2s;background:#444';
        var mailDot = document.createElement('span');
        mailDot.style.cssText = 'position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s';
        mailToggle.appendChild(mailDot);

        mailRow.appendChild(mailLabel);
        mailRow.appendChild(mailToggle);
        panel.appendChild(mailRow);

        var mailEnabled = false;
        function setMailState(val) {
          mailEnabled = val;
          mailToggle.style.background = val ? '#14b8a6' : '#444';
          mailDot.style.transform = val ? 'translateX(20px)' : 'translateX(0)';
        }

        // État persistant localStorage — default: true (actif)
        var _gmailSaved = localStorage.getItem('atum_gmail_enabled');
        setMailState(_gmailSaved === '1');
        // Sync discret avec le serveur (fire & forget, n'écrase pas le local)
        fetch((window.ATUM_API_URL || '') + '/api/gmail-config')
          .catch(function() {});

        mailToggle.addEventListener('click', function() {
          var newVal = !mailEnabled;
          setMailState(newVal);
          localStorage.setItem('atum_gmail_enabled', newVal ? '1' : '0');
          var _body = JSON.stringify({ enabled: newVal });
          var _hdrs = { 'Content-Type': 'application/json' };
          // Railway — effet immédiat sur le daemon en cours
          fetch((window.ATUM_API_URL || '') + '/api/gmail-config', {
            method: 'POST', headers: _hdrs, body: _body
          }).catch(function() {});
          // Vercel — persistance dans le repo GitHub (survit aux redémarrages Railway)
          fetch('/api/gmail-config', {
            method: 'POST', headers: _hdrs, body: _body
          }).catch(function() {});
        });

        // Fermer en cliquant dehors
        setTimeout(function () {
          document.addEventListener('click', function onOut(e) {
            var btn = document.querySelector('button[title="Parametres"]');
            if (!panel.contains(e.target) && (!btn || !btn.contains(e.target))) {
              panel.remove();
              document.removeEventListener('click', onOut);
            }
          });
        }, 60);

        document.body.appendChild(panel);
      };

      // ── PARTIE C — Capture listener document comme backup ─────────────────
      document.addEventListener('click', function (e) {
        var t = e.target;
        for (var i = 0; i < 5; i++) {
          if (!t || t.nodeType !== 1) break;
          if (t.tagName === 'BUTTON' && t.getAttribute('title') === 'Parametres') {
            e.stopImmediatePropagation();
            e.preventDefault();
            if (window._paiShowSettingsPanel) window._paiShowSettingsPanel();
            return;
          }
          t = t.parentElement;
        }
      }, true);

    })();
    </script>

  <body>
    <div id="root"></div>

    <!-- ══════════════════════════════════════════════════════════════
         ATUM CORNER LOGO — bas-droite, visible après login
         ══════════════════════════════════════════════════════════════ -->
    <style>
      #atum-corner-logo {
        position: fixed;
        bottom: 18px;
        right: 18px;
        width: 88px;
        height: auto;
        z-index: 999998;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s ease 0.2s;
        user-select: none;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.35));
      }
      #atum-corner-logo.visible { opacity: 0.95; }
      html[data-theme="light"] #atum-corner-logo { content: url('./atum-logo-light.jpg'); }
      html[data-theme="dark"]  #atum-corner-logo { content: url('./atum-logo-dark.jpg'); }
      @media (max-width: 640px) {
        #atum-corner-logo { width: 64px; bottom: 12px; right: 12px; }
      }
    </style>
    <img id="atum-corner-logo" src="./atum-logo-dark.jpg" alt="ATUM" />
    <script>
    (function() {
      var img = document.getElementById('atum-corner-logo');
      // Afficher seulement si l'utilisateur est déjà logué (ou après fermeture overlay)
      function _show() {
        if (!document.getElementById('atum-login-overlay')) {
          img.classList.add('visible');
        } else {
          setTimeout(_show, 200);
        }
      }
      try {
        var u = JSON.parse(localStorage.getItem('atum_user') || 'null');
        if (u && (u.prenom === 'admin' || (u.prenom && u.societe))) {
          img.classList.add('visible');
        } else {
          _show();
        }
      } catch(e) { _show(); }
    })();
    </script>

    <!-- ══════════════════════════════════════════════════════════════
         ATUM LOGIN OVERLAY — injecté avant React
         ══════════════════════════════════════════════════════════════ -->
    <style>
      #atum-login-overlay {
        position: fixed; inset: 0; z-index: 2147483647;
        display: flex; align-items: center; justify-content: center;
        background: radial-gradient(circle at 50% 50%, #0f1a2e 0%, #050a14 100%);
        overflow: hidden;
        font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #atum-login-overlay .atum-title-splash {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(0.3);
        font-size: 12vmin; font-weight: 700; letter-spacing: 0.4em;
        color: #14b8a6;
        text-shadow: 0 0 40px rgba(20, 184, 166, 0.6);
        opacity: 0;
        transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.34,1.56,.64,1);
        pointer-events: none;
      }
      #atum-login-overlay.intro .atum-title-splash { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      #atum-login-overlay.zoom  .atum-title-splash { opacity: 1; transform: translate(-50%, -50%) scale(1.4); }
      #atum-login-overlay.form  .atum-title-splash { opacity: 0; transform: translate(-50%, -50%) scale(2); }

      #atum-login-overlay .atum-flash {
        position: absolute; inset: 0;
        background: #ffffff; opacity: 0; pointer-events: none;
      }
      #atum-login-overlay.zoom .atum-flash {
        animation: atumFlash 0.5s ease-out;
      }
      @keyframes atumFlash {
        0%   { opacity: 0; }
        30%  { opacity: 0.7; }
        100% { opacity: 0; }
      }

      #atum-login-overlay.shake {
        animation: atumShake 0.5s cubic-bezier(.36,.07,.19,.97);
      }
      @keyframes atumShake {
        10%, 90%  { transform: translate3d(-2px, 0, 0); }
        20%, 80%  { transform: translate3d(4px, -2px, 0); }
        30%, 70%  { transform: translate3d(-6px, 2px, 0); }
        40%, 60%  { transform: translate3d(6px, -2px, 0); }
        50%       { transform: translate3d(-4px, 2px, 0); }
      }

      #atum-login-overlay .atum-panel {
        position: relative; z-index: 2;
        width: min(90vw, 420px);
        background: rgba(15, 26, 46, 0.92);
        border: 1px solid rgba(20, 184, 166, 0.25);
        border-radius: 18px;
        padding: 36px 32px 30px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
        backdrop-filter: blur(14px);
        opacity: 0;
        transform: translateY(20px) scale(0.95);
        transition: opacity 0.5s ease 0.2s, transform 0.5s cubic-bezier(.34,1.56,.64,1) 0.2s;
      }
      #atum-login-overlay.form .atum-panel { opacity: 1; transform: translateY(0) scale(1); }

      #atum-login-overlay .atum-panel h2 {
        margin: 0 0 6px; font-size: 26px; font-weight: 700; letter-spacing: 0.15em;
        color: #14b8a6; text-align: center;
      }
      #atum-login-overlay .atum-panel .atum-subtitle {
        margin: 0 0 26px; font-size: 13px; color: rgba(255,255,255,0.55);
        text-align: center; letter-spacing: 0.05em;
      }
      #atum-login-overlay .atum-field { margin-bottom: 14px; }
      #atum-login-overlay .atum-input,
      #atum-login-overlay .atum-select {
        width: 100%; padding: 13px 14px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; color: #fff; font-size: 14px;
        font-family: inherit; outline: none;
        transition: border-color 0.2s ease, background 0.2s ease;
        box-sizing: border-box;
      }
      #atum-login-overlay .atum-select {
        color-scheme: dark;
        appearance: none;
        -webkit-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path fill='%2314b8a6' d='M6 8L0 0h12z'/></svg>");
        background-repeat: no-repeat;
        background-position: right 14px center;
        padding-right: 36px;
      }
      #atum-login-overlay .atum-input:focus,
      #atum-login-overlay .atum-select:focus {
        border-color: #14b8a6; background: rgba(20, 184, 166, 0.06);
      }
      #atum-login-overlay .atum-select option {
        background: #0f1a2e;
        color: #ffffff;
        padding: 8px;
      }
      #atum-login-overlay .atum-select option:checked,
      #atum-login-overlay .atum-select option:hover {
        background: #14b8a6;
        color: #ffffff;
      }
      #atum-login-overlay .atum-input.error {
        border-color: #ef4444; animation: atumShakeField 0.3s;
      }
      @keyframes atumShakeField {
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
      #atum-login-overlay .atum-error-msg {
        color: #ef4444; font-size: 12px; margin: 4px 0 0 4px; min-height: 14px;
      }
      #atum-login-overlay .atum-submit {
        width: 100%; margin-top: 8px; padding: 14px;
        background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
        border: none; border-radius: 10px;
        color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 0.15em;
        cursor: pointer; text-transform: uppercase;
        transition: transform 0.15s ease, box-shadow 0.2s ease;
      }
      #atum-login-overlay .atum-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 30px rgba(20, 184, 166, 0.35);
      }
      #atum-login-overlay .atum-submit:active { transform: translateY(0); }
    </style>

    <script>
    (function () {
      // Si déjà logué → skip overlay
      try {
        var existing = JSON.parse(localStorage.getItem('atum_user') || 'null');
        if (existing && (existing.prenom === 'admin' || (existing.prenom && existing.societe))) {
          return;
        }
      } catch (e) {}

      var overlay = document.createElement('div');
      overlay.id = 'atum-login-overlay';
      overlay.className = 'intro';
      overlay.innerHTML = [
        '<div class="atum-flash"></div>',
        '<div class="atum-title-splash">ATUM</div>',
        '<div class="atum-panel">',
          '<h2>ATUM</h2>',
          '<p class="atum-subtitle">Agentic Target Utility Model</p>',
          '<form id="atum-login-form" autocomplete="off">',
            '<div class="atum-field">',
              '<input class="atum-input" id="atum-prenom" placeholder="Prénom *" autocomplete="off" autofocus />',
              '<div class="atum-error-msg" id="atum-err-prenom"></div>',
            '</div>',
            '<div class="atum-field" id="atum-societe-wrap">',
              '<select class="atum-select" id="atum-societe">',
                '<option value="">Société *</option>',
                '<option value="Saint-Gobain">Saint-Gobain</option>',
                '<option value="Havea">Havea</option>',
                '<option value="Freelance">Freelance</option>',
                '<option value="Autre">Autre…</option>',
              '</select>',
              '<div class="atum-error-msg" id="atum-err-societe"></div>',
            '</div>',
            '<div class="atum-field" id="atum-societe-autre-wrap" style="display:none">',
              '<input class="atum-input" id="atum-societe-autre" placeholder="Nom de ta société" autocomplete="off" />',
            '</div>',
            '<button type="submit" class="atum-submit">Entrer</button>',
          '</form>',
        '</div>'
      ].join('');
      document.body.appendChild(overlay);

      // Cache #root pendant l'overlay
      var root = document.getElementById('root');
      if (root) root.style.display = 'none';

      // Séquence d'animation
      setTimeout(function() { overlay.classList.remove('intro'); overlay.classList.add('zoom'); }, 700);
      setTimeout(function() { overlay.classList.add('shake'); }, 1100);
      setTimeout(function() {
        overlay.classList.remove('zoom'); overlay.classList.remove('shake');
        overlay.classList.add('form');
        var p = document.getElementById('atum-prenom'); if (p) p.focus();
      }, 1700);

      // Toggle "Autre"
      var selSociete = document.getElementById('atum-societe');
      var wrapAutre = document.getElementById('atum-societe-autre-wrap');
      selSociete.addEventListener('change', function() {
        wrapAutre.style.display = selSociete.value === 'Autre' ? 'block' : 'none';
        if (selSociete.value === 'Autre') {
          setTimeout(function(){ document.getElementById('atum-societe-autre').focus(); }, 50);
        }
      });

      // Admin bypass : cache le champ société si prénom === "admin"
      var inpPrenom = document.getElementById('atum-prenom');
      var wrapSociete = document.getElementById('atum-societe-wrap');
      inpPrenom.addEventListener('input', function() {
        var isAdmin = inpPrenom.value.trim().toLowerCase() === 'admin';
        wrapSociete.style.display = isAdmin ? 'none' : 'block';
        wrapAutre.style.display = (isAdmin || selSociete.value !== 'Autre') ? 'none' : 'block';
      });

      // Submit
      document.getElementById('atum-login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var prenom = inpPrenom.value.trim();
        var errPrenom = document.getElementById('atum-err-prenom');
        var errSociete = document.getElementById('atum-err-societe');
        errPrenom.textContent = ''; errSociete.textContent = '';
        inpPrenom.classList.remove('error'); selSociete.classList.remove('error');

        // Admin bypass
        if (prenom.toLowerCase() === 'admin') {
          localStorage.setItem('atum_user', JSON.stringify({ prenom: 'admin', societe: 'admin', isAdmin: true }));
          closeOverlay();
          return;
        }

        if (!prenom) {
          errPrenom.textContent = 'Le prénom est obligatoire';
          inpPrenom.classList.add('error');
          return;
        }
        var societeVal = selSociete.value;
        if (!societeVal) {
          errSociete.textContent = 'Sélectionne une société';
          selSociete.classList.add('error');
          return;
        }
        if (societeVal === 'Autre') {
          var libre = document.getElementById('atum-societe-autre').value.trim();
          if (!libre) {
            errSociete.textContent = 'Indique le nom de ta société';
            document.getElementById('atum-societe-autre').classList.add('error');
            return;
          }
          societeVal = libre;
        }

        localStorage.setItem('atum_user', JSON.stringify({
          prenom: prenom, societe: societeVal, isAdmin: false
        }));
        closeOverlay();
      });

      function closeOverlay() {
        overlay.style.transition = 'opacity 0.4s ease';
        overlay.style.opacity = '0';
        setTimeout(function() {
          overlay.remove();
          if (root) root.style.display = '';
        }, 400);
      }
    })();
    </script>
  </body>
</html>
