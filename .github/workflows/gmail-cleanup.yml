name: Gmail Cleanup — Débloquer emails PAI-Seen

on:
  workflow_dispatch:   # Lancement manuel uniquement

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run cleanup
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: node gmail-cleanup.js
